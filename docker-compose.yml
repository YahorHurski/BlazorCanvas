services:
  db:
    image: postgres:17
    container_name: canvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: canvas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - canvas-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d canvas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  canvas-pgdata:
